workflows:
  ios-distribution:
    name: Vyro iOS Distribution
    max_build_duration: 60
    environment:
      groups:
        - vyro-ios
      vars:
        BUNDLE_ID: "com.hosonno.gymtracker"
      node: v18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios --non-interactive
      - name: Find workspace
        script: |
          echo "=== iOS folder contents ==="
          ls ios/
          echo "=== Workspace files ==="
          find ios -name "*.xcworkspace" -maxdepth 2
          echo "=== Scheme files ==="
          find ios -name "*.xcscheme" -maxdepth 4
      - name: Install Pods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
      - name: Build iOS
        script: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 2 | head -1)
          SCHEME=$(find ios -name "*.xcscheme" -maxdepth 4 | head -1 | xargs basename | sed 's/.xcscheme//')
          echo "Using workspace: $WORKSPACE"
          echo "Using scheme: $SCHEME"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true